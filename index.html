<!DOCTYPE html>
<html>
<head>
  <title>Parts Selector</title>
  <style>
h1 {
margin-bottom: 10px;
}

.toolbar {
display: flex;
gap: 10px;
margin-bottom: 15px;
flex-wrap: wrap;
}

input {
padding: 8px;
width: 280px;
border-radius: 6px;
border: 1px solid #ccc;
}

button {
padding: 8px 12px;
border: none;
border-radius: 6px;
cursor: pointer;
background: #2d89ef;
color: white;
}

button {
background: #1b5fbf;
}

.secondary {
background: #6c757d;
}

.secondary {
background: #545b62;
}

.container {
display: flex;
gap: 20px;
}

.panel {
background: white;
padding: 15px;
border-radius: 10px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
flex: 1;
max-height: 500px;
overflow-y: auto;
}

.item {
padding: 8px;
border-bottom: 1px solid #eee;
display: flex;
align-items: center;
}

.item {
background: #f0f4ff;
}

.counts {
margin: 10px 0;
font-size: 14px;
color: #555;
}
  </style>
</head>
<body>

<h2>Parts Selector</h2>

<input type="text" id="searchBox" placeholder="Search part number OR description..." onkeyup="filterList()" />

<div class="container">
  <div>
    <h3>All Items</h3>
    <ul id="itemList"></ul>
  </div>

  <div>
    <h3>Remaining Items (Not Selected)</h3>
    <ul id="remainingList"></ul>
  </div>
</div>

<script>
  const items = [
    { part: "A123", desc: "Hydraulic Pump" },
    { part: "B456", desc: "Oil Filter" },
    { part: "C789", desc: "Air Compressor" },
    { part: "D012", desc: "Fuel Injector" },
    { part: "E345", desc: "Cooling Fan" }
  ];

  const selected = new Set();

  function renderList(filter = "") {
    const listEl = document.getElementById("itemList");
    listEl.innerHTML = "";

    items
      .filter(item =>
        item.part.toLowerCase().includes(filter) ||
        item.desc.toLowerCase().includes(filter)
      )
      .forEach(item => {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = selected.has(item.part);

        checkbox.onchange = () => {
          if (checkbox.checked) {
            selected.add(item.part);
          } else {
            selected.delete(item.part);
          }
          renderRemaining();
        };

        li.appendChild(checkbox);
        li.append(` ${item.part} - ${item.desc}`);
        listEl.appendChild(li);
      });
  }

  function renderRemaining() {
    const remainingEl = document.getElementById("remainingList");
    remainingEl.innerHTML = "";

    items
      .filter(item => !selected.has(item.part))
      .forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.part} - ${item.desc}`;
        remainingEl.appendChild(li);
      });
  }

  function filterList() {
    const value = document.getElementById("searchBox").value.toLowerCase();
    renderList(value);
  }

  // Initial render
  renderList();
  renderRemaining();
</script>

</body>
</html>
