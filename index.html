  { part: "74903SDA", desc: "Wrench" },
  { part: "3173TWA", desc: "#0-#1/4" },
  { part: "3150TWA", desc: "#1/4-#1/2" },
  { part: "3188TWA", desc: "#0-#1/2" }
  ];

  const selected = new Set();

  function renderList(filter = "") {
    const listEl = document.getElementById("itemList");
    listEl.innerHTML = "";

    items
      .filter(item =>
        item.part.toLowerCase().includes(filter) ||
        item.desc.toLowerCase().includes(filter)
      )
      .forEach(item => {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = selected.has(item.part);

        checkbox.onchange = () => {
          if (checkbox.checked) {
            selected.add(item.part);
          } else {
            selected.delete(item.part);
          }
          renderRemaining();
        };

        li.appendChild(checkbox);
        li.append(` ${item.part} - ${item.desc}`);
        listEl.appendChild(li);
      });
  }

  function renderRemaining() {
    const remainingEl = document.getElementById("remainingList");
    remainingEl.innerHTML = "";

    items
      .filter(item => !selected.has(item.part))
      .forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.part} - ${item.desc}`;
        remainingEl.appendChild(li);
      });
  }

  function filterList() {
    const value = document.getElementById("searchBox").value.toLowerCase();
    renderList(value);
  }
  function exportRemainingToPDF() {
  const remainingItems = items.filter(item => !selected.has(item.part));

  // Create container
  const container = document.createElement("div");
  container.style.padding = "10px";
  container.style.fontFamily = "Arial, sans-serif";

  // Title
  const title = document.createElement("h2");
  title.textContent = "Remaining Items Report";
  title.style.textAlign = "center";
  title.style.marginBottom = "10px";
  container.appendChild(title);

  // Create table
  const table = document.createElement("table");
  table.style.width = "100%";
  table.style.borderCollapse = "collapse";
  table.style.fontSize = "10px"; // small to fit everything

  // Header row
  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");

  ["Part", "Description"].forEach(text => {
    const th = document.createElement("th");
    th.textContent = text;
    th.style.border = "1px solid black";
    th.style.padding = "4px";
    th.style.background = "#eee";
    headerRow.appendChild(th);
  });

  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Body
  const tbody = document.createElement("tbody");

  remainingItems.forEach(item => {
    const row = document.createElement("tr");

    const partCell = document.createElement("td");
    partCell.textContent = item.part;
    partCell.style.border = "1px solid black";
    partCell.style.padding = "3px";

    const descCell = document.createElement("td");
    descCell.textContent = item.desc;
    descCell.style.border = "1px solid black";
    descCell.style.padding = "3px";

    row.appendChild(partCell);
    row.appendChild(descCell);
    tbody.appendChild(row);
  });

  table.appendChild(tbody);
  container.appendChild(table);

  // PDF options (force single page fit)
  const opt = {
    margin: 0.3,
    filename: "remaining-items.pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: "in", format: "letter", orientation: "portrait" },
    pagebreak: { mode: ["avoid-all"] }
  };

  html2pdf().set(opt).from(container).save();
}

  // Initial render
  renderList();
  renderRemaining();
